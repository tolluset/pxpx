name = "pixel-game-collab"
main = "cloudflare/worker.ts"
compatibility_date = "2026-03-07"

[[durable_objects.bindings]]
name = "ROOMS"
class_name = "PixelRoom"

[[durable_objects.bindings]]
name = "GITHUB_USERS"
class_name = "GithubUserRegistry"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["PixelRoom"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["GithubUserRegistry"]
